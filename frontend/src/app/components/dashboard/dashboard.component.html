<div class="page">
  <div class="page-hero">
    <h1>Welcome back, <span class="accent">{{ auth.getUsername() }}</span> 👋</h1>
    <p class="hero-sub">Here's an overview of your study progress.</p>
  </div>

  @if (error) { <div class="error-box">{{ error }}</div> }

  @if (stats) {
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">{{ stats.total_decks }}</div>
        <div class="stat-lbl">Decks</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">{{ stats.total_cards }}</div>
        <div class="stat-lbl">Cards</div>
      </div>
    </div>
  }

  <div class="quick-actions">
    <a class="action-tile" routerLink="/decks">
      <span class="tile-icon">📚</span>
      <strong>My Decks</strong>
      <span>Browse and manage</span>
    </a>
    <a class="action-tile" routerLink="/decks/new">
      <span class="tile-icon">➕</span>
      <strong>New Deck</strong>
      <span>Create a deck</span>
    </a>
  </div>
</div>
