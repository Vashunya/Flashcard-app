<div class="page form-page">
  <div class="form-card">
    <h1>{{ isEdit ? 'Edit Deck' : 'Create New Deck' }}</h1>

    @if (error) { <div class="error-box">{{ error }}</div> }

    <div class="form-group">
      <label>Title *</label>
      <input type="text" [(ngModel)]="form.title" placeholder="e.g. Spanish Vocabulary" class="input" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="form.description" placeholder="Optional description…" class="input" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Category *</label>
      <select [(ngModel)]="form.category" class="input">
        <option value="">Select a category…</option>
        @for (c of categories; track c.id) {
          <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>

    <div class="form-row">
      <button class="btn-primary" (click)="onSubmit()">{{ isEdit ? 'Update Deck' : 'Create Deck' }}</button>
      <a class="btn-ghost" routerLink="/decks">Cancel</a>
    </div>
  </div>
</div>
