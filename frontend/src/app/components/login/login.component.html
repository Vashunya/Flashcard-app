<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🎴</div>
    <h1 class="auth-title">FlashLearn</h1>
    <p class="auth-sub">{{ mode() === 'login' ? 'Sign in to continue' : 'Create your account' }}</p>

    @if (error()) {
      <div class="error-box">{{ error() }}</div>
    }

    <div class="form-group">
      <label>Username</label>
      <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)" placeholder="Enter username" class="input" />
    </div>

    @if (mode() === 'register') {
      <div class="form-group">
        <label>Email <span class="opt">(optional)</span></label>
        <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" placeholder="Enter email" class="input" />
      </div>
    }

    <div class="form-group">
      <label>Password</label>
      <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="Enter password" class="input" />
    </div>

    <button class="btn-primary full" (click)="onSubmit()" [disabled]="loading()">
      {{ loading() ? 'Loading…' : (mode() === 'login' ? 'Sign In' : 'Create Account') }}
    </button>

    <p class="auth-switch">
      {{ mode() === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <span class="link" (click)="toggle()">{{ mode() === 'login' ? 'Register' : 'Sign in' }}</span>
    </p>
  </div>
</div>
