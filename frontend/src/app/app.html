@if (auth.isLoggedIn()) {
  <nav class="navbar">
    <a class="nav-brand" routerLink="/dashboard">🎴 FlashLearn</a>
    <div class="nav-links">
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/decks">My Decks</a>
      <span class="nav-sep">|</span>
      <span class="nav-user">{{ auth.getUsername() }}</span>
      <button class="btn-logout" (click)="auth.logout()">Logout</button>
    </div>
  </nav>
}
<main class="main-content">
  <router-outlet />
</main>
